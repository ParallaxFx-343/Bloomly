<!DOCTYPE html>

<style>
  body { background: #1a1a2e; font-family: system-ui; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 40px; }

  h2 { color: #A8C5A0; font-size: 18px; margin: 0 0 8px 0; }

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100px;

  .plant-card span { color: #aaa; font-size: 12px; }
  .section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
</style>
